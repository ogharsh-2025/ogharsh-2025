name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *" # runs every 12 hours
  workflow_dispatch: # allows manual triggering
  push:
    branches:
      - main # triggers on push to main branch

permissions:
  contents: write # required to push SVGs to branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Generate Snake SVG Animations (both Light and Dark palettes)
      - name: Generate Github Contribution Grid Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ogharsh-2025
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Deploy SVGs to the 'output' branch
      # Using crazy-max/ghaction-github-pages to push the generated SVGs in dist/ to the output branch
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
