name: Update Profile Art

on:
  schedule:
    - cron: '0 0 * * *' # runs daily at midnight
  workflow_dispatch: # allows manual triggering

permissions:
  contents: write # crucial for committing and pushing back

jobs:
  update-art:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch Contributions
        env:
          GH_PROFILE_USER: ogharsh-2025
        run: |
          python scripts/fetch_contributions.py

      - name: Render Heatmap SVG
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update contributions and heatmap" && git push)
